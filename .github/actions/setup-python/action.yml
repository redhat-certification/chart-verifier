name: Setup Python
description: |
  Consistently installs python across this project.
  Should be used as a replacement for direct calls to actions/setup-python.
runs:
  using: composite
  steps:
    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: '3.10'
